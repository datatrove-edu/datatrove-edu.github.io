{{ define "main" }}
<main class="container">
  <h1>Select the function family</h1>
  <ul >
  <!-- <ul style="list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:.6rem 1rem"> -->
    {{ range $function, $pages := .Data.Terms }}
      <li>
        <a class="function" href="{{ .Page.RelPermalink }}">{{ strings.FirstUpper $function }}</a>
        <span style="color:#888">({{ len $pages }})</span>
      </li>
    {{ end }}
  </ul>
</main>
{{ end }}
