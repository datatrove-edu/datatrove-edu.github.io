{{ define "main" }}
<main class="container">
  <h1>Select the Math topic</h1>
  <ul>
  <!-- <ul style="list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:.6rem 1rem"> -->
    {{ range $math_topic, $pages := .Data.Terms }}
      <li>
        <a class="math_topic" href="{{ .Page.RelPermalink }}">{{ $math_topic }}</a>
        <span style="color:#888">({{ len $pages }})</span>
      </li>
    {{ end }}
  </ul>
</main>
{{ end }}
