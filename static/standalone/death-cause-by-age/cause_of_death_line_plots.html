const COLORS = [
  '#3266ad','#c0392b','#27ae60','#8e44ad','#e67e22',
  '#16a085','#d35400','#2980b9','#7f8c8d','#e74c3c',
  '#1abc9c','#9b59b6','#f39c12','#2ecc71','#34495e',
  '#e91e63','#ff5722','#607d8b','#795548','#009688'
];

const grid = document.getElementById('charts-grid');

Object.keys(DATA).forEach((cause, i) => {
  const d = DATA[cause];
  const total = d.deaths.reduce((a,b)=>a+b,0);
  const color = COLORS[i % COLORS.length];

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px;';

  const title = document.createElement('p');
  title.textContent = shortNames[cause] || cause;
  title.style.cssText = 'font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; line-height: 1.3;';

  const sub = document.createElement('p');
  sub.textContent = total.toLocaleString() + ' total deaths';
  sub.style.cssText = 'font-size: 11px; color: var(--color-text-secondary); margin: 0 0 10px;';

  const canvasWrap = document.createElement('div');
  canvasWrap.style.cssText = 'position: relative; width: 100%; height: 150px;';

  const canvas = document.createElement('canvas');
  canvas.id = 'c' + i;
  canvas.setAttribute('role', 'img');
  canvas.setAttribute('aria-label', (shortNames[cause] || cause) + ' deaths by age');

  canvasWrap.appendChild(canvas);
  wrapper.appendChild(title);
  wrapper.appendChild(sub);
  wrapper.appendChild(canvasWrap);
  grid.appendChild(wrapper);

  new Chart(canvas, {
    type: 'line',
    data: {
      labels: d.ages,
      datasets: [{
        data: d.deaths,
        borderColor: color,
        backgroundColor: color + '40',
        borderWidth: 1.5,
        pointRadius: 2,
        pointHoverRadius: 4,
        pointBackgroundColor: color,
        pointBorderWidth: 0,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => 'Age ' + ctx[0].label,
            label: ctx => ctx.parsed.y.toLocaleString() + ' deaths'
          }
        }
      },
      scales: {
        x: {
          ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 6, font: { size: 10 }, color: '#888' },
          grid: { display: false },
          border: { display: false }
        },
        y: {
          ticks: {
            maxTicksLimit: 4,
            font: { size: 10 },
            color: '#888',
            callback: v => v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? Math.round(v/1000)+'k' : v
          },
          grid: { color: 'rgba(128,128,128,0.08)' },
          border: { display: false }
        }
      }
    }
  });
});
